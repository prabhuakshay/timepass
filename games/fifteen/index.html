<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>15 Puzzle</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🧩</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--font-body); }
  body { overflow: hidden; }

  #arena {
    position: fixed; inset: 0; overflow: hidden;
    user-select: none; color: #fff;
    display: grid; place-items: center;
    transition: background 220ms ease;
    background: radial-gradient(120% 120% at 50% 25%, #1a2140 0%, #0c0e1c 100%);
  }
  #arena.done { background: radial-gradient(120% 120% at 50% 25%, #6b4bff 0%, #2b1a63 100%); }

  /* top overlay bar */
  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 6;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem clamp(1rem, 4vw, 1.6rem); pointer-events: none;
  }
  .bar a { pointer-events: auto; text-decoration: none; color: #fff; }
  .brand { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; opacity: 0.95; }
  .brand .logo { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(135deg, #8b7cff, #c04cff); font-size: 0.95rem; }
  .bar .right { display: flex; gap: 0.5rem; }
  .chip {
    display: inline-flex; align-items: center; gap: 0.35rem; font: 500 0.85rem/1 var(--font-body);
    padding: 0.5rem 0.8rem; border-radius: 10px; color: #fff;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(8px); transition: background .15s; cursor: pointer;
  }
  .chip:hover { background: rgba(255,255,255,0.22); }

  /* live HUD */
  .hud {
    display: flex; justify-content: center; gap: 0.6rem; margin-bottom: 1.2rem;
  }
  .stat {
    display: inline-flex; flex-direction: column; align-items: center; gap: 0.15rem;
    min-width: 84px; padding: 0.5rem 0.9rem; border-radius: 12px;
    background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px);
  }
  .stat .k { font: 600 0.62rem/1 var(--font-body); letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.65; }
  .stat .v { font-family: var(--font-display); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 1.25rem; line-height: 1; }

  .wrap { display: flex; flex-direction: column; align-items: center; }

  /* board */
  .board {
    position: relative;
    width: min(88vw, 420px); height: min(88vw, 420px);
    padding: 10px; border-radius: 20px;
    background: rgba(0,0,0,0.30);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 24px 60px -18px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);
    touch-action: manipulation;
  }
  .tile {
    position: absolute;
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; font-variant-numeric: tabular-nums;
    font-size: clamp(1.4rem, 7vw, 2.1rem);
    color: #fff; border-radius: 14px; cursor: pointer;
    background: linear-gradient(150deg, #8b7cff, #c04cff);
    box-shadow: 0 6px 16px -6px rgba(139,124,255,0.7), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: left .13s cubic-bezier(.2,.8,.3,1), top .13s cubic-bezier(.2,.8,.3,1), transform .1s ease;
  }
  .tile:active { transform: scale(0.96); }
  .board.solved .tile { background: linear-gradient(150deg, #7dffc4, #29d18f); box-shadow: 0 6px 16px -6px rgba(41,209,143,0.7), inset 0 1px 0 rgba(255,255,255,0.25); cursor: default; }

  .actions { margin-top: 1.2rem; display: flex; gap: 0.6rem; }
  .btn {
    font: 600 0.9rem/1 var(--font-body); cursor: pointer;
    padding: 0.7rem 1.2rem; border-radius: 12px; color: #fff;
    background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.16);
    transition: background .15s;
  }
  .btn:hover { background: rgba(255,255,255,0.2); }
  .btn-primary { background: linear-gradient(135deg, #8b7cff, #c04cff); border-color: transparent; }
  .btn-primary:hover { filter: brightness(1.08); background: linear-gradient(135deg, #8b7cff, #c04cff); }

  .hint { margin-top: 1rem; font: 500 0.85rem/1.4 var(--font-body); opacity: 0.6; text-align: center; }

  .best { position: fixed; bottom: 1.3rem; left: 0; right: 0; text-align: center; font: 500 0.9rem/1 var(--font-body); opacity: 0.6; pointer-events: none; }

  /* win overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 8; display: none; place-items: center; text-align: center;
    padding: 1.5rem; background: rgba(8,10,22,0.72); backdrop-filter: blur(4px);
  }
  .overlay.show { display: grid; }
  .overlay .inner { max-width: 520px; }
  .kicker { font: 600 0.72rem/1 var(--font-body); letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.7; }
  .num { font-family: var(--font-display); font-weight: 700; font-variant-numeric: tabular-nums; font-size: clamp(3rem, 13vw, 5.4rem); line-height: 1; letter-spacing: -0.03em; margin-top: 0.5rem; }
  .num small { font-size: 0.28em; font-weight: 600; opacity: 0.75; margin-left: 0.15em; }
  .sub-stats { display: flex; justify-content: center; gap: 1.6rem; margin-top: 1.2rem; flex-wrap: wrap; }
  .sub-stats div { display: flex; flex-direction: column; gap: 0.2rem; }
  .sub-stats .sk { font: 600 0.62rem/1 var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6; }
  .sub-stats .sv { font-family: var(--font-display); font-weight: 700; font-size: 1.35rem; }

  .badge {
    display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1rem;
    font: 700 0.8rem/1 var(--font-display); letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.5rem 0.9rem; border-radius: 999px; color: #0c1a12;
    background: linear-gradient(135deg, #7dffc4, #29d18f);
    animation: pop .4s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="../../"><span class="logo">🧩</span> 15 Puzzle</a>
  <div class="right">
    <a class="chip" href="stats.html">📊 Stats</a>
    <a class="chip" href="../../">← Arcade</a>
  </div>
</div>

<div id="arena">
  <div class="wrap">
    <div class="hud">
      <div class="stat"><span class="k">Time</span><span class="v" id="hudTime">0.0</span></div>
      <div class="stat"><span class="k">Moves</span><span class="v" id="hudMoves">0</span></div>
      <div class="stat"><span class="k">Best</span><span class="v" id="hudBest">—</span></div>
    </div>
    <div class="board" id="board"></div>
    <div class="actions">
      <button class="btn btn-primary" id="newGame">New Game</button>
    </div>
    <p class="hint">Click a tile next to the blank, or use the arrow keys.</p>
  </div>
</div>

<div class="best" id="best"></div>

<div class="overlay" id="overlay">
  <div class="inner">
    <div class="kicker">Solved!</div>
    <div class="num" id="finalTime">0.0<small>s</small></div>
    <div id="badgeSlot"></div>
    <div class="sub-stats">
      <div><span class="sk">Moves</span><span class="sv" id="finalMoves">0</span></div>
      <div><span class="sk">Best time</span><span class="sv" id="finalBest">—</span></div>
    </div>
    <div class="actions" style="justify-content:center">
      <button class="btn btn-primary" id="playAgain">Play again</button>
    </div>
  </div>
</div>

<script type="module">
  import { createStore } from "../../common/stats-store.js";

  const N = 4;
  const SIZE = N * N;              // 16
  const SOLVED = [...Array(SIZE - 1).keys()].map((i) => i + 1).concat(0); // 1..15,0
  const store = createStore("fifteen", { lowerIsBetter: true, unit: "s" });

  const boardEl = document.getElementById("board");
  const hudTime = document.getElementById("hudTime");
  const hudMoves = document.getElementById("hudMoves");
  const hudBest = document.getElementById("hudBest");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");

  let board = SOLVED.slice();
  let state = "idle";             // idle | playing | done
  let started = false;
  let moves = 0;
  let startTime = 0, rafId = null;
  let best = store.best();

  const idx = (r, c) => r * N + c;
  const rowOf = (i) => Math.floor(i / N);
  const colOf = (i) => i % N;

  function renderBest() {
    hudBest.textContent = best != null ? best + "s" : "—";
    bestEl.textContent = best != null ? `Best time · ${best} s` : "";
  }

  function layout() {
    // position all tiles based on current board state
    const inner = boardEl.clientWidth - 20; // minus padding (10px each side)
    const cell = inner / N;
    const gap = cell * 0.06;
    const tsize = cell - gap * 2;
    for (const el of boardEl.children) {
      const val = Number(el.dataset.val);
      const i = board.indexOf(val);
      const r = rowOf(i), c = colOf(i);
      el.style.width = tsize + "px";
      el.style.height = tsize + "px";
      el.style.left = (10 + c * cell + gap) + "px";
      el.style.top = (10 + r * cell + gap) + "px";
    }
  }

  function build() {
    boardEl.innerHTML = "";
    for (let v = 1; v < SIZE; v++) {
      const el = document.createElement("div");
      el.className = "tile";
      el.dataset.val = String(v);
      el.textContent = String(v);
      el.addEventListener("pointerdown", () => tapTile(v));
      boardEl.appendChild(el);
    }
    layout();
  }

  function isSolved() {
    for (let i = 0; i < SIZE; i++) if (board[i] !== SOLVED[i]) return false;
    return true;
  }

  // Slide the tile with the given value toward the blank, if it shares the
  // blank's row or column. Shifts the whole segment between them.
  function slideTile(v) {
    if (state === "done") return false;
    const ti = board.indexOf(v);
    const bi = board.indexOf(0);
    const tr = rowOf(ti), tc = colOf(ti);
    const br = rowOf(bi), bc = colOf(bi);
    if (tr !== br && tc !== bc) return false;   // not aligned with blank

    if (tr === br) {
      const step = bc > tc ? 1 : -1;            // shift tiles toward blank
      for (let c = bc; c !== tc; c -= step) {
        board[idx(tr, c)] = board[idx(tr, c - step)];
      }
    } else {
      const step = br > tr ? 1 : -1;
      for (let r = br; r !== tr; r -= step) {
        board[idx(r, tc)] = board[idx(r - step, tc)];
      }
    }
    board[ti] = 0;
    return true;
  }

  function tapTile(v) {
    if (slideTile(v)) afterMove();
  }

  // Arrow: slide a tile in the arrow's direction into the blank.
  function slideDir(dr, dc) {
    if (state === "done") return false;
    const bi = board.indexOf(0);
    const br = rowOf(bi), bc = colOf(bi);
    const sr = br - dr, sc = bc - dc;           // source tile position
    if (sr < 0 || sr >= N || sc < 0 || sc >= N) return false;
    const v = board[idx(sr, sc)];
    return slideTile(v);
  }

  function afterMove() {
    if (!started) {
      started = true;
      startTime = performance.now();
      tick();
    }
    moves++;
    hudMoves.textContent = String(moves);
    layout();
    if (isSolved()) finish();
  }

  function tick() {
    hudTime.textContent = ((performance.now() - startTime) / 1000).toFixed(1);
    rafId = requestAnimationFrame(tick);
  }

  function finish() {
    cancelAnimationFrame(rafId);
    rafId = null;
    state = "done";
    boardEl.classList.add("solved");
    document.getElementById("arena").classList.add("done");

    const elapsed = (performance.now() - startTime) / 1000;      // seconds
    const secs = elapsed;
    const record = store.isRecord(secs);
    store.record(secs, { moves });
    if (record) best = Math.round(secs);
    renderBest();

    document.getElementById("finalTime").innerHTML = `${secs.toFixed(1)}<small>s</small>`;
    document.getElementById("finalMoves").textContent = String(moves);
    document.getElementById("finalBest").textContent = best != null ? best + "s" : "—";
    document.getElementById("badgeSlot").innerHTML = record ? `<div class="badge">🏆 New personal best</div>` : "";
    overlay.classList.add("show");
  }

  function shuffle() {
    // Start solved and apply many random legal blank-moves -> always solvable.
    board = SOLVED.slice();
    let bi = SIZE - 1;                 // blank starts at last cell
    let prev = -1;
    const total = 400;
    for (let k = 0; k < total; k++) {
      const br = rowOf(bi), bc = colOf(bi);
      const neighbors = [];
      if (br > 0) neighbors.push(bi - N);
      if (br < N - 1) neighbors.push(bi + N);
      if (bc > 0) neighbors.push(bi - 1);
      if (bc < N - 1) neighbors.push(bi + 1);
      // avoid immediately undoing the last move for a livelier shuffle
      const pool = neighbors.filter((n) => n !== prev);
      const ni = (pool.length ? pool : neighbors)[Math.floor(Math.random() * (pool.length ? pool.length : neighbors.length))];
      board[bi] = board[ni];
      board[ni] = 0;
      prev = bi;
      bi = ni;
    }
    // extremely unlikely, but never start already solved
    if (isSolved()) return shuffle();
  }

  function newGame() {
    cancelAnimationFrame(rafId);
    rafId = null;
    state = "playing";
    started = false;
    moves = 0;
    startTime = 0;
    hudMoves.textContent = "0";
    hudTime.textContent = "0.0";
    boardEl.classList.remove("solved");
    document.getElementById("arena").classList.remove("done");
    overlay.classList.remove("show");
    shuffle();
    layout();
  }

  document.getElementById("newGame").addEventListener("click", newGame);
  document.getElementById("playAgain").addEventListener("click", newGame);

  document.addEventListener("keydown", (e) => {
    let moved = false;
    switch (e.key) {
      case "ArrowUp":    e.preventDefault(); moved = slideDir(-1, 0); break; // tile below moves up
      case "ArrowDown":  e.preventDefault(); moved = slideDir(1, 0);  break; // tile above moves down
      case "ArrowLeft":  e.preventDefault(); moved = slideDir(0, -1); break; // tile right moves left
      case "ArrowRight": e.preventDefault(); moved = slideDir(0, 1);  break; // tile left moves right
      default: return;
    }
    if (moved) afterMove();
  });

  window.addEventListener("resize", layout);

  // boot
  renderBest();
  build();
  newGame();
</script>
<script type="module">
  import { mountHelp } from "../../common/how-to.js";
  mountHelp({
    title: "15 Puzzle",
    emoji: "🧩",
    tagline: "Slide the tiles into order, 1 to 15.",
    rules: [
      "Slide tiles into the empty space to rearrange the board.",
      "Put the numbers in order, 1 through 15, with the blank last.",
      "The timer starts on your first move.",
      "Your fastest solve is saved (lower time is better).",
    ],
    controls: [
      ["Click / Tap a tile", "Slide it toward the gap"],
      ["Arrow keys", "Slide a tile into the gap"],
    ],
  });
</script>
</body>
</html>
