<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reaction Test — Stats</title>
<style>
  :root {
    --bg: #0f1115; --surface: #181b22; --border: #2a2f3a;
    --text: #e8eaf0; --muted: #9aa3b2;
    --data: #7c5cff;     /* reaction time series */
    --best: #2ba05c;     /* running-best reference */
    --grid: #262b36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, sans-serif; background: var(--bg);
    color: var(--text); line-height: 1.5;
  }
  .links { display: flex; gap: 1rem; padding: 1rem 1.25rem; font-size: 0.9rem; }
  .links a { color: #cbb6ff; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  main { max-width: 860px; margin: 0 auto; padding: 0 1.25rem 3rem; }
  h1 { margin: 0.5rem 0 0.25rem; }
  .sub { color: var(--muted); margin: 0 0 1.5rem; }

  .tiles {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 0.75rem; margin-bottom: 2rem;
  }
  .tile {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.9rem 1rem;
  }
  .tile .label { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .tile .value { font-size: 1.7rem; font-weight: 700; margin-top: 0.15rem; }
  .tile .value small { font-size: 0.9rem; font-weight: 400; color: var(--muted); }
  .tile.best .value { color: var(--best); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem;
  }
  .chart-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.5rem; }
  .chart-head h2 { margin: 0; font-size: 1.05rem; }
  .legend { display: flex; gap: 1rem; font-size: 0.82rem; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 0.4rem; }
  .swatch { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
  .swatch.data { background: var(--data); }
  .swatch.best { background: var(--best); }
  .chart-wrap { position: relative; margin-top: 0.75rem; }
  canvas { width: 100%; display: block; }
  #tooltip {
    position: absolute; pointer-events: none; background: #0b0d12; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.6rem;
    font-size: 0.8rem; white-space: nowrap; opacity: 0; transition: opacity 0.08s;
    transform: translate(-50%, -120%); z-index: 2;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; }
  td.num { font-variant-numeric: tabular-nums; }
  .record { color: var(--best); }

  .actions { display: flex; gap: 0.75rem; align-items: center; }
  button {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.45rem 0.9rem; cursor: pointer; font: inherit;
  }
  button:hover { color: var(--text); border-color: var(--muted); }
  button.danger.armed { color: #ff6b6b; border-color: #ff6b6b; }

  .empty { color: var(--muted); text-align: center; padding: 3rem 1rem; }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7fb; --surface: #fff; --border: #e2e5ec; --text: #1a1d24;
      --muted: #5b6373; --grid: #eaecf2;
    }
    #tooltip { background: #fff; }
  }
</style>
</head>
<body>
<nav class="links">
  <a href="../../">← Arcade</a>
  <a href="index.html">🎮 Play</a>
</nav>

<main>
  <h1>Reaction Test — Stats</h1>
  <p class="sub">Your history, stored only in this browser.</p>

  <div id="content"></div>
</main>

<script type="module">
  import { loadAttempts, clearAttempts, summarize } from "./store.js";

  const content = document.getElementById("content");
  const attempts = loadAttempts();

  const fmt = (n) => Math.round(n).toLocaleString();

  if (!attempts.length) {
    content.innerHTML = `<p class="empty">No games recorded yet.<br>
      <a href="index.html" style="color:#cbb6ff">Play a round</a> and your times show up here.</p>`;
  } else {
    render();
  }

  function render() {
    const s = summarize(attempts);
    content.innerHTML = `
      <section class="tiles">
        <div class="tile best"><div class="label">Best</div><div class="value">${fmt(s.best)}<small> ms</small></div></div>
        <div class="tile"><div class="label">Recent avg (5)</div><div class="value">${fmt(s.recentAvg)}<small> ms</small></div></div>
        <div class="tile"><div class="label">Average</div><div class="value">${fmt(s.average)}<small> ms</small></div></div>
        <div class="tile"><div class="label">Median</div><div class="value">${fmt(s.median)}<small> ms</small></div></div>
        <div class="tile"><div class="label">Attempts</div><div class="value">${fmt(s.count)}</div></div>
        <div class="tile"><div class="label">Last</div><div class="value">${fmt(s.last)}<small> ms</small></div></div>
      </section>

      <section class="card">
        <div class="chart-head">
          <h2>Reaction time over attempts (ms)</h2>
          <div class="legend">
            <span><i class="swatch data"></i>each attempt</span>
            <span><i class="swatch best"></i>best so far</span>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart" role="img"
            aria-label="Line chart of reaction time in milliseconds across ${s.count} attempts. Lower is better."></canvas>
          <div id="tooltip"></div>
        </div>
      </section>

      <section class="card">
        <h2 style="margin-top:0;font-size:1.05rem">Recent attempts</h2>
        <table>
          <thead><tr><th>#</th><th>When</th><th class="num">Time</th></tr></thead>
          <tbody>${recentRows()}</tbody>
        </table>
      </section>

      <div class="actions">
        <button id="clear" class="danger">Clear all data</button>
      </div>`;

    drawChart();
    wireClear();
  }

  function recentRows() {
    const best = Math.min(...attempts.map((a) => a.ms));
    return attempts.slice(-12).reverse().map((a, i) => {
      const n = attempts.length - i;
      const when = a.t ? new Date(a.t).toLocaleString() : "—";
      const isRec = a.ms === best;
      return `<tr>
        <td>${n}</td>
        <td>${when}</td>
        <td class="num ${isRec ? "record" : ""}">${fmt(a.ms)} ms${isRec ? " 🏆" : ""}</td>
      </tr>`;
    }).join("");
  }

  // ---- Chart: single data series + running-best reference line ----
  let geom = null; // saved layout for hit-testing on hover

  function drawChart() {
    const canvas = document.getElementById("chart");
    const cssW = canvas.clientWidth || 780;
    const cssH = 300;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);

    const css = getComputedStyle(document.documentElement);
    const C = (v) => css.getPropertyValue(v).trim();
    const pad = { l: 48, r: 16, t: 12, b: 26 };
    const w = cssW - pad.l - pad.r;
    const h = cssH - pad.t - pad.b;

    const times = attempts.map((a) => a.ms);
    const runningBest = [];
    let b = Infinity;
    for (const t of times) { b = Math.min(b, t); runningBest.push(b); }

    const maxY = Math.max(...times) * 1.05;
    const minY = Math.min(0, Math.min(...times) * 0.9);
    const n = times.length;
    const x = (i) => pad.l + (n === 1 ? w / 2 : (i / (n - 1)) * w);
    const y = (v) => pad.t + h - ((v - minY) / (maxY - minY)) * h;

    // grid + y labels
    ctx.strokeStyle = C("--grid");
    ctx.fillStyle = C("--muted");
    ctx.lineWidth = 1;
    ctx.font = "11px system-ui, sans-serif";
    ctx.textBaseline = "middle";
    const ticks = 4;
    for (let i = 0; i <= ticks; i++) {
      const v = minY + (i / ticks) * (maxY - minY);
      const yy = y(v);
      ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(pad.l + w, yy); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.textAlign = "right";
      ctx.fillText(Math.round(v).toString(), pad.l - 8, yy);
    }

    // running-best reference line (dashed)
    ctx.strokeStyle = C("--best");
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    runningBest.forEach((v, i) => (i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v))));
    ctx.stroke();
    ctx.setLineDash([]);

    // data line
    ctx.strokeStyle = C("--data");
    ctx.lineWidth = 2;
    ctx.beginPath();
    times.forEach((v, i) => (i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v))));
    ctx.stroke();

    // markers (only if few points, to avoid clutter)
    if (n <= 40) {
      ctx.fillStyle = C("--data");
      times.forEach((v, i) => { ctx.beginPath(); ctx.arc(x(i), y(v), 3, 0, Math.PI * 2); ctx.fill(); });
    }

    // x-axis end labels
    ctx.fillStyle = C("--muted");
    ctx.textAlign = "left"; ctx.fillText("1", pad.l, pad.t + h + 14);
    ctx.textAlign = "right"; ctx.fillText(n.toString(), pad.l + w, pad.t + h + 14);

    geom = { canvas, pad, w, h, x, y, times, runningBest, n, cssH };
    wireHover();
  }

  function wireHover() {
    const { canvas } = geom;
    const tooltip = document.getElementById("tooltip");
    const ctx = canvas.getContext("2d");

    canvas.onpointermove = (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const { pad, w, n, x, y, times, runningBest } = geom;
      let i = n === 1 ? 0 : Math.round(((mx - pad.l) / w) * (n - 1));
      i = Math.max(0, Math.min(n - 1, i));

      drawChart();                       // redraw base
      const px = x(i), py = y(times[i]);
      // crosshair
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue("--muted").trim();
      ctx.globalAlpha = 0.4; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px, pad.t); ctx.lineTo(px, pad.t + geom.h); ctx.stroke();
      ctx.globalAlpha = 1;
      // highlight point
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--data").trim();
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.stroke();

      tooltip.style.left = px + "px";
      tooltip.style.top = py + "px";
      tooltip.style.opacity = "1";
      tooltip.innerHTML = `<b>#${i + 1}</b> · ${fmt(times[i])} ms<br><span style="color:var(--best)">best ${fmt(runningBest[i])} ms</span>`;
    };
    canvas.onpointerleave = () => {
      document.getElementById("tooltip").style.opacity = "0";
      drawChart();
    };
  }

  // Two-click confirm — avoids a blocking window.confirm() dialog.
  function wireClear() {
    const btn = document.getElementById("clear");
    let armed = false;
    btn.onclick = () => {
      if (!armed) {
        armed = true;
        btn.classList.add("armed");
        btn.textContent = "Click again to erase everything";
        setTimeout(() => { armed = false; btn.classList.remove("armed"); btn.textContent = "Clear all data"; }, 3000);
        return;
      }
      clearAttempts();
      location.reload();
    };
  }

  window.addEventListener("resize", () => { if (attempts.length) drawChart(); });
</script>
</body>
</html>
