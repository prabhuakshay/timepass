<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reaction Test</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: "Space Grotesk", system-ui, sans-serif;
    --font-body: "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--font-body); }
  body { overflow: hidden; }

  #pad {
    position: fixed; inset: 0; display: grid; place-items: center; text-align: center;
    cursor: pointer; user-select: none; color: #fff;
    transition: background 220ms ease;
    background: radial-gradient(120% 120% at 50% 25%, #1a2140 0%, #0c0e1c 100%);
  }
  #pad.waiting { background: radial-gradient(120% 120% at 50% 25%, #7a2233 0%, #451018 100%); }
  #pad.ready   { background: radial-gradient(120% 120% at 50% 25%, #16b981 0%, #0a6d4c 100%); }
  #pad.result  { background: radial-gradient(120% 120% at 50% 25%, #6b4bff 0%, #2b1a63 100%); }

  /* top overlay bar */
  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem clamp(1rem, 4vw, 1.6rem); pointer-events: none;
  }
  .bar a { pointer-events: auto; text-decoration: none; color: #fff; }
  .brand { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-display); font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; opacity: 0.95; }
  .brand .logo { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(135deg, #8b7cff, #c04cff); font-size: 0.95rem; }
  .bar .right { display: flex; gap: 0.5rem; }
  .chip {
    display: inline-flex; align-items: center; gap: 0.35rem; font: 500 0.85rem/1 var(--font-body);
    padding: 0.5rem 0.8rem; border-radius: 10px; color: #fff;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.16);
    backdrop-filter: blur(8px); transition: background .15s;
  }
  .chip:hover { background: rgba(255,255,255,0.22); }

  .stage { padding: 1.5rem; max-width: 640px; }
  .kicker { font: 600 0.72rem/1 var(--font-body); letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.7; }
  h1 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.02em; margin: 0.7rem 0 0.4rem; font-size: clamp(2rem, 7vw, 3.2rem); line-height: 1.05; }
  .num { font-family: var(--font-display); font-weight: 700; font-variant-numeric: tabular-nums; font-size: clamp(3.4rem, 15vw, 6rem); line-height: 1; letter-spacing: -0.03em; }
  .num small { font-size: 0.28em; font-weight: 600; opacity: 0.75; margin-left: 0.15em; }
  .msg { font-size: 1.05rem; opacity: 0.85; margin: 0.9rem 0 0; }
  .best { position: fixed; bottom: 1.3rem; left: 0; right: 0; text-align: center; font: 500 0.9rem/1 var(--font-body); opacity: 0.6; pointer-events: none; }

  .badge {
    display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1rem;
    font: 700 0.8rem/1 var(--font-display); letter-spacing: 0.05em; text-transform: uppercase;
    padding: 0.5rem 0.9rem; border-radius: 999px; color: #0c1a12;
    background: linear-gradient(135deg, #7dffc4, #29d18f);
    animation: pop .4s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div class="bar">
  <a class="brand" href="../../"><span class="logo">⚡</span> Reaction</a>
  <div class="right">
    <a class="chip" href="stats.html">📊 Stats</a>
    <a class="chip" href="../../">← Arcade</a>
  </div>
</div>

<div id="pad">
  <div class="stage" id="stage">
    <div class="kicker">Reaction Test</div>
    <h1>Test your reflexes</h1>
    <p class="msg">Click, tap, or press <b>Space</b> to start.</p>
  </div>
</div>
<div class="best" id="best"></div>

<script type="module">
  import { createStore } from "../../common/stats-store.js";

  const store = createStore("reaction", { lowerIsBetter: true, unit: "ms" });
  const pad = document.getElementById("pad");
  const stage = document.getElementById("stage");
  const bestEl = document.getElementById("best");

  let state = "idle";           // idle | waiting | ready | result
  let timer = null, startTime = 0;
  let best = store.best();

  function renderBest() {
    bestEl.textContent = best != null ? `Personal best · ${best} ms` : "";
  }
  renderBest();

  function setState(next, cls) { state = next; pad.className = cls; }

  function schedule() {
    setState("waiting", "waiting");
    stage.innerHTML = `<div class="kicker">Get ready</div><h1 class="pulse">Wait for green…</h1><p class="msg">Don't jump early.</p>`;
    const delay = 1000 + Math.random() * 3000;
    timer = setTimeout(() => {
      startTime = performance.now();
      setState("ready", "ready");
      stage.innerHTML = `<div class="num">TAP!</div>`;
    }, delay);
  }

  function showResult(ms) {
    const record = store.isRecord(ms);
    store.record(ms);
    if (record) best = Math.round(ms);
    renderBest();
    setState("result", "result");
    stage.innerHTML = `
      <div class="kicker">Your time</div>
      <div class="num">${Math.round(ms)}<small>ms</small></div>
      ${record ? `<div class="badge">🏆 New personal best</div>` : ""}
      <p class="msg">Click or press <b>Space</b> to go again.</p>`;
  }

  function tooSoon() {
    clearTimeout(timer);
    setState("result", "result");
    stage.innerHTML = `<div class="kicker">Oops</div><h1>Too soon 🙈</h1><p class="msg">Wait for green. Click or Space to retry.</p>`;
  }

  function trigger() {
    switch (state) {
      case "idle":
      case "result": schedule(); break;
      case "waiting": tooSoon(); break;
      case "ready": showResult(performance.now() - startTime); break;
    }
  }

  pad.addEventListener("pointerdown", trigger);
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.key === " ") {
      e.preventDefault();
      if (!e.repeat) trigger();
    }
  });
</script>
</body>
</html>
