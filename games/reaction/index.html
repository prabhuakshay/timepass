<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reaction Test</title>
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #pad {
    height: 100vh; display: grid; place-items: center; text-align: center;
    cursor: pointer; user-select: none; color: #fff; transition: background 0.05s;
  }
  .wait  { background: #b03535; }
  .ready { background: #2e8b57; }
  .idle  { background: #23324a; }
  .result{ background: #4a3f7a; }
  h1 { font-size: 1.8rem; margin: 0 0 0.5rem; }
  p  { margin: 0.25rem; opacity: 0.9; }
  .big { font-size: 3rem; font-weight: 700; }
  .links { position: fixed; top: 12px; left: 14px; font-size: 0.9rem; display: flex; gap: 1rem; }
  .links a { color: #cbb6ff; }
</style>
</head>
<body>
<nav class="links">
  <a href="../../">← Arcade</a>
  <a href="stats.html">📊 Stats</a>
</nav>
<div id="pad" class="idle">
  <div>
    <h1 id="title">Reaction Test</h1>
    <p id="msg">Click, tap, or press space to start</p>
  </div>
</div>

<script type="module">
  import { recordAttempt, loadAttempts } from "./store.js";

  const pad = document.getElementById("pad");
  const title = document.getElementById("title");
  const msg = document.getElementById("msg");

  let state = "idle";   // idle | waiting | ready | result
  let timer = null;
  let startTime = 0;
  // Seed the best from past sessions so records persist across reloads.
  const past = loadAttempts();
  let best = past.length ? Math.min(...past.map((a) => a.ms)) : null;

  function setState(next, cls) {
    state = next;
    pad.className = cls;
  }

  function schedule() {
    setState("waiting", "wait");
    title.textContent = "Wait for green…";
    msg.textContent = "";
    const delay = 1000 + Math.random() * 3000;
    timer = setTimeout(() => {
      startTime = performance.now();
      setState("ready", "ready");
      title.textContent = "TAP!";
    }, delay);
  }

  function showResult(ms) {
    const isRecord = best === null || ms < best;
    if (isRecord) best = ms;
    recordAttempt(ms);
    setState("result", "result");
    title.innerHTML = `<span class="big">${Math.round(ms)} ms</span>`;
    msg.textContent = isRecord && past.length
      ? `🏆 New best! · click or space to go again`
      : `Best: ${Math.round(best)} ms · click or space to go again`;
  }

  function trigger() {
    switch (state) {
      case "idle":
      case "result":
        schedule();
        break;
      case "waiting":            // acted too early
        clearTimeout(timer);
        setState("result", "result");
        title.textContent = "Too soon! 🙈";
        msg.textContent = "Click or press space to try again";
        break;
      case "ready":
        showResult(performance.now() - startTime);
        break;
    }
  }

  pad.addEventListener("pointerdown", trigger);
  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.key === " ") {
      e.preventDefault();        // stop the page from scrolling
      if (!e.repeat) trigger();  // ignore auto-repeat from a held key
    }
  });
</script>
</body>
</html>
