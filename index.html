<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timepass — Browser Games</title>
<meta name="description" content="A little arcade of browser games. Quick to play, easy to lose track of time.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎮</text></svg>">
<link rel="stylesheet" href="common/ui.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="./"><span class="logo">🎮</span> Timepass</a>
  <nav class="topnav">
    <a class="btn" href="https://github.com/prabhuakshay/timepass" target="_blank" rel="noopener">GitHub</a>
  </nav>
</div>

<main class="container">
  <header class="hero">
    <div class="eyebrow"><span class="dot"></span> <span id="eyebrow-count">the arcade</span></div>
    <h1>A little arcade of<br><span class="grad">browser games.</span></h1>
    <p>Quick to pick up, easy to lose an afternoon to. Everything runs right here — no installs, no sign-ups.</p>
  </header>

  <section id="grid" class="grid" aria-live="polite">
    <p class="empty" style="grid-column:1/-1">Loading games…</p>
  </section>
</main>

<p class="footer" id="footer"></p>

<script type="module">
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function card(g) {
    const tags = (g.tags || []).length
      ? `<div class="tags">${g.tags.map((t) => `<span class="tag">${esc(t)}</span>`).join("")}</div>`
      : "<span></span>";
    return `<a class="card" href="${esc(g.path)}">
      <div class="thumb">${esc(g.icon || "🎮")}</div>
      <h2>${esc(g.title)}</h2>
      <p class="desc">${esc(g.description || "")}</p>
      <div class="foot">
        ${tags}
        <span class="play">Play →</span>
      </div>
    </a>`;
  }

  fetch("games.json")
    .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then((games) => {
      const visible = games.filter((g) => !g.hidden);
      const grid = document.getElementById("grid");
      if (!visible.length) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <span class="big">🕹️</span>No games yet. Drop a folder into <code>games/</code> and run <code>npm run build</code>.</div>`;
        return;
      }
      grid.innerHTML = visible.map(card).join("");
      document.getElementById("eyebrow-count").textContent =
        `${visible.length} game${visible.length === 1 ? "" : "s"} to play`;
      document.getElementById("footer").textContent = "Made for wasting time, beautifully.";
    })
    .catch((err) => {
      document.getElementById("grid").innerHTML =
        `<div class="empty" style="grid-column:1/-1">Couldn't load the catalog (${esc(err.message)}). Run <code>npm run build</code>.</div>`;
    });
</script>
</body>
</html>
